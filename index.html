<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat con n8n</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

#chat{
    width:400px;
    height:500px;
    border:1px solid #ccc;
    background:white;
    margin:40px auto;
    display:flex;
    flex-direction:column;
}

#messages{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.message{
    margin:8px 0;
    padding:8px;
    border-radius:6px;
    max-width:75%;
}

.user{
    background:#d1e7ff;
    align-self:flex-end;
}

.bot{
    background:#eeeeee;
    align-self:flex-start;
}

#input-area{
    display:flex;
    border-top:1px solid #ccc;
}

#input{
    flex:1;
    padding:10px;
    border:none;
}

button{
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:white;
    cursor:pointer;
}
</style>

</head>
<body>

<div id="chat">
    
    <div id="messages"></div>

    <div id="input-area">
        <input id="input" placeholder="Escribe un mensaje..." />
        <button onclick="sendMessage()">Enviar</button>
    </div>

</div>

<script>

const webhook = "https://n8n-latest-th2h.onrender.com:5678/webhook/chat-ia";

const webhook = "https://n8n-latest-th2h.onrender.com:/webhook-test/chat-ia";

function addMessage(text, sender){

    const msg = document.createElement("div");
    msg.classList.add("message");
    msg.classList.add(sender);

    msg.innerText = text;

    document.getElementById("messages").appendChild(msg);

    document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;

}

async function sendMessage(){

    const input = document.getElementById("input");
    const text = input.value;

    if(!text) return;

    addMessage(text,"user");

    input.value="";

    try{

        const response = await fetch(webhook,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:text
            })
        });

        const data = await response.json();

        addMessage(data.reply || "Sin respuesta","bot");

    }catch(error){

        addMessage("Error conectando con el servidor","bot");

    }

}

document.getElementById("input")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
